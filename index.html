<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Calculator - Spain 2026</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#F7F7F5;color:#1A1A1A}
.header{background:#fff;border-bottom:1px solid #E5E5E5;padding:16px 32px;display:flex;align-items:center;position:sticky;top:0;z-index:10}
.header h1{font-size:20px;font-weight:700}
.header .meta{font-size:11px;color:#999;margin-left:auto}
.wrap{max-width:1100px;margin:0 auto;padding:32px 24px}
.input-box{background:#fff;border-radius:8px;padding:24px;margin-bottom:24px;border:1px solid #E5E5E5}
.input-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr auto;gap:16px;align-items:end}
.input-row+.input-row{margin-top:16px;padding-top:16px;border-top:1px solid #F0F0F0}
@media(max-width:700px){.input-row{grid-template-columns:1fr 1fr}}
.input-row label{font-size:12px;font-weight:600;color:#444;margin-bottom:6px;display:block;letter-spacing:0.03em}
.input-row select{width:100%;padding:8px 12px;border:1px solid #E5E5E5;border-radius:4px;font-size:14px;font-family:inherit;background:#fff;color:#1A1A1A;cursor:pointer;outline:none}
.btn-remove{width:32px;height:36px;border:1px solid #E5E5E5;border-radius:4px;background:#fff;color:#999;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-bottom:1px}
.btn-remove:hover{background:#FEE;color:#C00;border-color:#C00}
.btn-add{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:1px dashed #1B7B6E;border-radius:4px;background:#fff;color:#1B7B6E;font-size:13px;font-weight:600;cursor:pointer;margin-top:16px;font-family:inherit}
.btn-add:hover{background:#F0F7F6}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:0 24px}
@media(max-width:700px){.cards{grid-template-columns:1fr}}
.card-head{background:#fff;border-top-left-radius:8px;border-top-right-radius:8px;padding:20px 24px}
.card-head.elite{border:1px solid #E5E5E5}
.card-head.ep{border:1px solid #E5E5E5;position:relative;background:#FFFDF5}
.card-head h2{font-size:22px;font-weight:700}
.card-head .sub{font-size:13px;color:#999;margin-top:4px}
.card-head .elp-info{font-size:13px;color:#1B7B6E;font-weight:600;margin-top:2px}
.badge-rec{position:absolute;top:12px;right:12px;background:#E8B54D;color:#fff;font-size:10px;font-weight:700;padding:4px 10px;border-radius:3px;letter-spacing:0.05em}
.row{padding:18px 24px;background:#fff}
.row.elite{border-left:1px solid #E5E5E5;border-right:1px solid #E5E5E5;border-bottom:1px solid #F0F0F0}
.row.elite.last{border-bottom:1px solid #E5E5E5;border-bottom-left-radius:8px;border-bottom-right-radius:8px}
.row.ep{border-left:1px solid #E5E5E5;border-right:1px solid #E5E5E5;border-bottom:1px solid #F0F0F0;background:#FFFDF5}
.row.ep.last{border-bottom:1px solid #E5E5E5;border-bottom-left-radius:8px;border-bottom-right-radius:8px;background:#FFFDF5}
.row .period{font-size:13px;font-weight:600;color:#444;margin-bottom:4px}
.save-badge{display:inline-block;font-size:11px;font-weight:600;padding:3px 10px;border-radius:3px;color:#fff}
.save-badge.green{background:#1B7B6E}
.save-badge.gold{background:#E8B54D}
.price{font-size:26px;font-weight:700;margin-top:4px}
.price .suffix{font-size:13px;font-weight:400;color:#999}
.monthly{font-size:13px;color:#999;margin-top:2px}
.breakdown-box{background:#fff;border-radius:8px;border:1px solid #E5E5E5;margin-top:24px;overflow:hidden}
.breakdown-box .title{padding:16px 24px;border-bottom:1px solid #E5E5E5;font-size:14px;font-weight:600}
table{width:100%;font-size:13px;border-collapse:collapse;margin-top:12px}
th{text-align:left;padding:8px 4px;font-weight:600;color:#444;font-size:11px;letter-spacing:0.05em;text-transform:uppercase;border-bottom:1px solid #E5E5E5}
td{padding:8px 4px;border-bottom:1px solid #F0F0F0}
.tbl-wrap{padding:0 24px 16px;overflow-x:auto}
tr.total-row td{font-weight:700;border-top:2px solid #E5E5E5;border-bottom:none}
.empty{background:#fff;border-radius:8px;border:1px solid #E5E5E5;padding:40px;text-align:center;color:#999;font-size:14px}
.footer{text-align:center;padding:24px 0 8px;font-size:11px;color:#999}
</style>
</head>
<body>

<div class="header">
  <h1>Price Calculator - Spain 2026</h1>
  <span class="meta">Data refreshed Mar 2026</span>
</div>

<div class="wrap">
  <div class="input-box">
    <div id="rows-container"></div>
    <button class="btn-add" id="btn-add">+ Add Province</button>
  </div>
  <div id="output"></div>
  <div class="footer">Source: JamesEdition BigQuery - 12-month rolling window - Real Estate (excl. rentals)</div>
</div>

<script>
var ALL_DATA={
  ES:[
    {district:"Alicante",price_elite:14.42,price_elite_plus:16.83,price_elp_3m:136.00},
    {district:"Barcelona",price_elite:16.19,price_elite_plus:18.89,price_elp_3m:106.00},
    {district:"Ibiza",price_elite:38.75,price_elite_plus:45.21,price_elp_3m:268.00},
    {district:"Madrid",price_elite:32.38,price_elite_plus:37.77,price_elp_3m:273.00},
    {district:"Malaga",price_elite:33.16,price_elite_plus:38.69,price_elp_3m:235.00},
    {district:"Mallorca",price_elite:35.22,price_elite_plus:41.09,price_elp_3m:231.00},
    {district:"Other",price_elite:14.72,price_elite_plus:17.17,price_elp_3m:96.00}
  ]
};

var TIERS=[
  {label:"0",count:0,elps:0},
  {label:"1-5",count:5,elps:1},
  {label:"6-15",count:15,elps:2},
  {label:"16-30",count:30,elps:3},
  {label:"31-60",count:60,elps:5},
  {label:"61-100",count:100,elps:7}
];

var country="ES";
var districts=ALL_DATA[country];
var rows=[];
var nextId=0;

function psych(v){
  if(v<=0)return 0;
  if(v<200)return Math.round(v/10)*10-1;
  if(v<10000)return Math.round(v/100)*100-1;
  return Math.round(v/500)*500-1;
}

function fmt(v){return"\u20AC"+v.toLocaleString("en-US")}
function fmtDec(v){return"\u20AC"+v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g,",")}

function getDistrictData(loc){
  if(loc==="__whole__"){
    var maxD=districts[0];
    for(var i=1;i<districts.length;i++){if(districts[i].price_elite>maxD.price_elite)maxD=districts[i]}
    return{data:{district:"Whole Country",price_elite:maxD.price_elite,price_elite_plus:maxD.price_elite_plus,price_elp_3m:maxD.price_elp_3m},source:maxD.district};
  }
  for(var i=0;i<districts.length;i++){if(districts[i].district===loc)return{data:districts[i],source:null}}
  return{data:districts[0],source:null};
}

function addRow(loc,tierIdx,addElps){
  var id=nextId++;
  rows.push({id:id,loc:loc||"__whole__",tierIdx:tierIdx||0,addElps:addElps||0});
  renderRows();render();
}

function removeRow(id){
  rows=rows.filter(function(r){return r.id!==id});
  renderRows();render();
}

function renderRows(){
  var c=document.getElementById("rows-container");
  c.innerHTML="";
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var div=document.createElement("div");
    div.className="input-row";
    div.setAttribute("data-id",r.id);
    var showRemove=rows.length>1;
    var html='<div><label>Country</label><select disabled><option>ES</option></select></div>';
    html+='<div><label>Province</label><select class="sel-loc" data-id="'+r.id+'">';
    html+='<option value="__whole__"'+(r.loc==="__whole__"?" selected":"")+'>Whole Country</option>';
    for(var j=0;j<districts.length;j++){
      html+='<option value="'+districts[j].district+'"'+(r.loc===districts[j].district?" selected":"")+'>'+districts[j].district+'</option>';
    }
    html+='</select></div>';
    html+='<div><label>Listings</label><select class="sel-tier" data-id="'+r.id+'">';
    for(var j=0;j<TIERS.length;j++){
      html+='<option value="'+j+'"'+(r.tierIdx===j?" selected":"")+'>'+TIERS[j].label+'</option>';
    }
    html+='</select></div>';
    html+='<div><label>Additional ELPs</label><select class="sel-elps" data-id="'+r.id+'">';
    for(var j=0;j<=10;j++){
      html+='<option value="'+j+'"'+(r.addElps===j?" selected":"")+'>'+j+'</option>';
    }
    html+='</select></div>';
    if(showRemove){html+='<button class="btn-remove" data-id="'+r.id+'">&times;</button>'}
    else{html+='<div style="width:32px"></div>'}
    div.innerHTML=html;
    c.appendChild(div);
  }
  var locs=c.querySelectorAll(".sel-loc");
  for(var i=0;i<locs.length;i++){locs[i].addEventListener("change",function(){var id=parseInt(this.getAttribute("data-id"));for(var j=0;j<rows.length;j++){if(rows[j].id===id)rows[j].loc=this.value}render()})}
  var tiers=c.querySelectorAll(".sel-tier");
  for(var i=0;i<tiers.length;i++){tiers[i].addEventListener("change",function(){var id=parseInt(this.getAttribute("data-id"));for(var j=0;j<rows.length;j++){if(rows[j].id===id)rows[j].tierIdx=parseInt(this.value)}render()})}
  var elps=c.querySelectorAll(".sel-elps");
  for(var i=0;i<elps.length;i++){elps[i].addEventListener("change",function(){var id=parseInt(this.getAttribute("data-id"));for(var j=0;j<rows.length;j++){if(rows[j].id===id)rows[j].addElps=parseInt(this.value)}render()})}
  var removes=c.querySelectorAll(".btn-remove");
  for(var i=0;i<removes.length;i++){removes[i].addEventListener("click",function(){removeRow(parseInt(this.getAttribute("data-id")))})}
}

function render(){
  var $o=document.getElementById("output");
  var rc=[];var tL=0;var tE=0;
  var hasAny=false;

  for(var i=0;i<rows.length;i++){
    var r=rows[i];var tier=TIERS[r.tierIdx];var info=getDistrictData(r.loc);var d=info.data;
    if(tier.count===0){rc.push(null);continue}
    hasAny=true;
    var cnt=tier.count;var iE=tier.elps;var rE=iE+r.addElps;var eM=d.price_elp_3m;
    var e3r=d.price_elite*cnt;var e6r=d.price_elite*2*0.9*cnt;var e12r=d.price_elite*4*0.8*cnt;
    var ep3=eM*3*rE;var ep6=eM*3*rE*2*0.9;var ep12=eM*3*rE*4*0.8;
    tL+=cnt;tE+=rE;
    rc.push({loc:r.loc==="__whole__"?"Whole Country":r.loc,source:info.source,tier:tier,cnt:cnt,elps:rE,e3r:e3r,e6r:e6r,e12r:e12r,ep3r:e3r+ep3,ep6r:e6r+ep6,ep12r:e12r+ep12,elpMo:eM,priceElite:d.price_elite});
  }

  if(!hasAny){$o.innerHTML='<div class="empty">Select a listing tier to see pricing.</div>';return}

  var e3=0,e6=0,e12=0,ep3=0,ep6=0,ep12=0;
  for(var i=0;i<rc.length;i++){
    if(!rc[i])continue;
    e3+=psych(rc[i].e3r);e6+=psych(rc[i].e6r);e12+=psych(rc[i].e12r);
    ep3+=psych(rc[i].ep3r);ep6+=psych(rc[i].ep6r);ep12+=psych(rc[i].ep12r);
  }

  var eS6=Math.max(e3*2-e6,0);
  var eS12=Math.max(e3*4-e12,0);
  var epS6=Math.max(ep3*2-ep6,0);
  var epS12=Math.max(ep3*4-ep12,0);

  var periods=[
    {label:"3 Months",mo:3,eT:e3,epT:ep3,eS:0,epS:0},
    {label:"6 Months",mo:6,eT:e6,epT:ep6,eS:eS6,epS:epS6},
    {label:"12 Months",mo:12,eT:e12,epT:ep12,eS:eS12,epS:epS12}
  ];

  var tierLabels=[];
  for(var i=0;i<rc.length;i++){if(rc[i])tierLabels.push(rc[i].tier.label)}
  var lL=tierLabels.join(" + ")+" Listings";

  var h='<div class="cards">';
  h+='<div class="card-head elite"><h2>Elite</h2><div class="sub">'+lL+'</div><div class="sub" style="visibility:hidden">_</div></div>';
  h+='<div class="card-head ep"><div class="badge-rec">Recommended</div><h2>Elite Plus</h2><div class="sub">'+lL+'</div><div class="elp-info">'+tE+' Promoted Listing'+(tE!==1?'s':'')+'</div></div>';

  for(var i=0;i<periods.length;i++){
    var p=periods[i];var last=(i===2)?" last":"";
    h+='<div class="row elite'+last+'"><div class="period">'+p.label+'</div>';
    h+=p.eS>0?'<div><span class="save-badge green">Save '+fmt(p.eS)+'</span></div>':'';
    h+='<div class="price">'+fmt(p.eT)+' <span class="suffix">Total</span></div>';
    h+='<div class="monthly">'+fmtDec(p.eT/p.mo)+' / Month</div></div>';
    h+='<div class="row ep'+last+'"><div class="period">'+p.label+'</div>';
    h+=p.epS>0?'<div><span class="save-badge gold">Save '+fmt(p.epS)+'</span></div>':'';
    h+='<div class="price">'+fmt(p.epT)+' <span class="suffix">Total</span></div>';
    h+='<div class="monthly">'+fmtDec(p.epT/p.mo)+' / Month</div></div>';
  }
  h+='</div>';

  h+='<div class="breakdown-box"><div class="title">Cost Breakdown by Province</div><div class="tbl-wrap">';
  h+='<table><thead><tr><th>Province</th><th>Listings</th><th>ELPs</th><th>Elite (3m)</th><th>Elite (6m)</th><th>Elite (12m)</th><th>Elite+ (3m)</th><th>Elite+ (6m)</th><th>Elite+ (12m)</th></tr></thead><tbody>';
  for(var i=0;i<rc.length;i++){
    var x=rc[i];if(!x)continue;
    var lb=x.loc;
    if(x.source)lb+=' <span style="font-size:11px;color:#1B7B6E">('+x.source+')</span>';
    h+='<tr><td>'+lb+'</td><td>'+x.tier.label+'</td><td>'+x.elps+'</td>';
    h+='<td>'+fmt(psych(x.e3r))+'</td><td>'+fmt(psych(x.e6r))+'</td><td>'+fmt(psych(x.e12r))+'</td>';
    h+='<td>'+fmt(psych(x.ep3r))+'</td><td>'+fmt(psych(x.ep6r))+'</td><td>'+fmt(psych(x.ep12r))+'</td></tr>';
  }
  if(rc.filter(function(r){return r}).length>1){
    h+='<tr class="total-row"><td>Total</td><td>'+tL+'</td><td>'+tE+'</td>';
    h+='<td>'+fmt(e3)+'</td><td>'+fmt(e6)+'</td><td>'+fmt(e12)+'</td>';
    h+='<td>'+fmt(ep3)+'</td><td>'+fmt(ep6)+'</td><td>'+fmt(ep12)+'</td></tr>';
  }
  h+='</tbody></table></div></div>';
  $o.innerHTML=h;
}

document.getElementById("btn-add").addEventListener("click",function(){addRow()});
addRow("__whole__",0,0);
</script>
</body>
</html>
