<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Calculator - Spain 2026</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #F7F7F5; color: #1A1A1A; }
  .header { background: #fff; border-bottom: 1px solid #E5E5E5; padding: 16px 32px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; }
  .header h1 { font-size: 20px; font-weight: 700; }
  .header .meta { font-size: 11px; color: #999; margin-left: auto; }
  .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
  .input-box { background: #fff; border-radius: 8px; padding: 24px; margin-bottom: 24px; border: 1px solid #E5E5E5; }
  .input-row { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr auto; gap: 16px; align-items: end; }
  .input-row + .input-row { margin-top: 16px; padding-top: 16px; border-top: 1px solid #F0F0F0; }
  @media (max-width: 700px) { .input-row { grid-template-columns: 1fr 1fr; } }
  .input-row label { font-size: 12px; font-weight: 600; color: #444; margin-bottom: 6px; display: block; letter-spacing: 0.03em; }
  .input-row select { width: 100%; padding: 8px 12px; border: 1px solid #E5E5E5; border-radius: 4px; font-size: 14px; font-family: inherit; background: #fff; color: #1A1A1A; cursor: pointer; outline: none; }
  .btn-remove { width: 32px; height: 36px; border: 1px solid #E5E5E5; border-radius: 4px; background: #fff; color: #999; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; margin-bottom: 1px; }
  .btn-remove:hover { background: #FEE; color: #C00; border-color: #C00; }
  .btn-add { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border: 1px dashed #1B7B6E; border-radius: 4px; background: #fff; color: #1B7B6E; font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 16px; font-family: inherit; }
  .btn-add:hover { background: #F0F7F6; }
  .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 0 24px; }
  @media (max-width: 700px) { .cards { grid-template-columns: 1fr; } }
  .card-head { background: #fff; border-top-left-radius: 8px; border-top-right-radius: 8px; padding: 20px 24px; }
  .card-head.elite { border: 1px solid #E5E5E5; }
  .card-head.ep { border: 1px solid #E5E5E5; position: relative; background: #FFFDF5; }
  .card-head h2 { font-size: 22px; font-weight: 700; }
  .card-head .sub { font-size: 13px; color: #999; margin-top: 4px; }
  .card-head .elp-info { font-size: 13px; color: #1B7B6E; font-weight: 600; margin-top: 2px; }
  .badge-rec { position: absolute; top: 12px; right: 12px; background: #E8B54D; color: #fff; font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 3px; letter-spacing: 0.05em; }
  .row { padding: 18px 24px; background: #fff; }
  .row.elite { border-left: 1px solid #E5E5E5; border-right: 1px solid #E5E5E5; border-bottom: 1px solid #F0F0F0; }
  .row.elite.last { border-bottom: 1px solid #E5E5E5; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; }
  .row.ep { border-left: 1px solid #E5E5E5; border-right: 1px solid #E5E5E5; border-bottom: 1px solid #F0F0F0; background: #FFFDF5; }
  .row.ep.last { border-bottom: 1px solid #E5E5E5; border-bottom-left-radius: 8px; border-bottom-right-radius: 8px; background: #FFFDF5; }
  .row .period { font-size: 13px; font-weight: 600; color: #444; margin-bottom: 4px; }
  .save-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 3px; color: #fff; }
  .save-badge.green { background: #1B7B6E; }
  .save-badge.gold { background: #E8B54D; }
  .price { font-size: 26px; font-weight: 700; margin-top: 4px; }
  .price .suffix { font-size: 13px; font-weight: 400; color: #999; }
  .monthly { font-size: 13px; color: #999; margin-top: 2px; }
  .breakdown-box { background: #fff; border-radius: 8px; border: 1px solid #E5E5E5; margin-top: 24px; overflow: hidden; }
  .breakdown-box .title { padding: 16px 24px; border-bottom: 1px solid #E5E5E5; font-size: 14px; font-weight: 600; }
  .calc-table { width: 100%; font-size: 13px; border-collapse: collapse; margin-top: 12px; }
  .calc-table th { text-align: left; padding: 8px 4px; font-weight: 600; color: #444; font-size: 11px; letter-spacing: 0.05em; text-transform: uppercase; border-bottom: 1px solid #E5E5E5; }
  .calc-table td { padding: 8px 4px; border-bottom: 1px solid #F0F0F0; }
  .tbl-wrap { padding: 0 24px 16px; overflow-x: auto; }
  .calc-table tr.total-row td { font-weight: 700; border-top: 2px solid #E5E5E5; border-bottom: none; }
  .empty { background: #fff; border-radius: 8px; border: 1px solid #E5E5E5; padding: 40px; text-align: center; color: #999; font-size: 14px; }
  .footer { text-align: center; padding: 24px 0 8px; font-size: 11px; color: #999; }

  /* Row-level push buttons */
  .row-push-btn { margin-top: 12px; width: 100%; padding: 7px 12px; background: transparent; border: 1px solid #DDDDDD; border-radius: 4px; font-size: 12px; font-weight: 600; color: #888; cursor: pointer; font-family: inherit; display: flex; align-items: center; justify-content: center; gap: 6px; transition: border-color 0.15s, color 0.15s, background 0.15s; }
  .row-push-btn:hover { border-color: #FF7A59; color: #FF7A59; background: #FFF5F3; }
  .row-push-btn:disabled { color: #bbb; border-color: #eee; cursor: not-allowed; background: transparent; }
  .row-push-btn.sent { border-color: #1B7B6E; color: #1B7B6E; background: #EAF5F3; }
  .row.ep .row-push-btn:hover { border-color: #FF7A59; color: #FF7A59; background: #FFF0EB; }
  .row.ep .row-push-btn.sent { background: #EAF5F3; }

  /* HubSpot panel */
  .hs-panel { background: #fff; border-radius: 8px; border: 1px solid #E5E5E5; margin-top: 24px; overflow: hidden; }
  .hs-deal-id-input { padding: 7px 12px; border: 1px solid #E5E5E5; border-radius: 4px; font-size: 14px; font-family: inherit; color: #1A1A1A; outline: none; width: 180px; }
  .hs-deal-id-input:focus { border-color: #FF7A59; }
  .hs-status { padding: 10px 24px; font-size: 13px; display: none; }
  .hs-status.success { background: #EAF5F3; color: #1B7B6E; border-top: 1px solid #C3DED9; display: block; }
  .hs-status.error { background: #FEF2F2; color: #B91C1C; border-top: 1px solid #FECACA; display: block; }
  .hs-status.loading { background: #F5F5F5; color: #666; border-top: 1px solid #E5E5E5; display: block; }
</style>
</head>
<body>

<div class="header">
  <h1>Price Calculator - Spain 2026</h1>
  <span class="meta">Data refreshed Mar 2026</span>
</div>

<div class="wrap">
  <div class="input-box">
    <div id="rows-container"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid #F0F0F0;">
      <button class="btn-add" id="btn-add" style="margin-top:0">+ Add Province</button>
      <div style="display:flex;align-items:center;gap:10px;">
        <svg width="16" height="16" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="28" fill="#FF7A59"/><path d="M22 16v10.5M22 26.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM34 22.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm0-3v7.5m0 0a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11Z" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>
        <label style="font-size:12px;font-weight:600;color:#444;letter-spacing:0.03em;">DEAL ID</label>
        <input type="text" id="hs-deal-id" class="hs-deal-id-input" placeholder="e.g. 12345678" />
      </div>
    </div>
  </div>
  <div id="output"></div>
  <div class="footer">Source: JamesEdition BigQuery · 12-month rolling window · Real Estate (excl. rentals)</div>
</div>

<script>
// ─── Configuration ────────────────────────────────────────────────────────────
var N8N_WEBHOOK_URL = "https://james-edition.app.n8n.cloud/webhook/price-calculator-hs";
// ─────────────────────────────────────────────────────────────────────────────

// price_elite_5   = per-listing price for 1–5 listings   (10% take rate)
// price_elite_15  = per-listing price for 6–15 listings  (8%  take rate)
// price_elite_30 = per-listing price for 16–30 listings (7% take rate)
// price_elite_60 = per-listing price for 31–100 listings (6% take rate)
// price_elp_3m   = monthly ELP price (6% take rate × demand multiplier)
var ALL_DATA = {
  ES: [
    { district:"Alicante",               price_elite_5:24.50, price_elite_15:19.60, price_elite_30:17.15, price_elite_60:14.70, price_elp_3m:121.00 },
    { district:"Barcelona",              price_elite_5:27.13, price_elite_15:21.71, price_elite_30:18.99, price_elite_60:16.28, price_elp_3m:92.00  },
    { district:"Cádiz",                  price_elite_5:31.16, price_elite_15:24.93, price_elite_30:21.81, price_elite_60:18.70, price_elp_3m:122.00 },
    { district:"Girona",                 price_elite_5:27.13, price_elite_15:21.71, price_elite_30:18.99, price_elite_60:16.28, price_elp_3m:92.00  },
    { district:"Ibiza",                  price_elite_5:63.31, price_elite_15:50.65, price_elite_30:44.32, price_elite_60:37.99, price_elp_3m:216.00 },
    { district:"Madrid",                 price_elite_5:54.18, price_elite_15:43.35, price_elite_30:37.93, price_elite_60:32.51, price_elp_3m:258.00 },
    { district:"Mallorca",               price_elite_5:57.55, price_elite_15:46.04, price_elite_30:40.29, price_elite_60:34.53, price_elp_3m:196.00 },
    { district:"Málaga",                 price_elite_5:53.44, price_elite_15:42.75, price_elite_30:37.41, price_elite_60:32.07, price_elp_3m:187.00 },
    { district:"Santa Cruz De Tenerife", price_elite_5:26.23, price_elite_15:20.98, price_elite_30:18.36, price_elite_60:15.74, price_elp_3m:89.00  },
    { district:"Valencia",               price_elite_5:21.38, price_elite_15:17.10, price_elite_30:14.96, price_elite_60:12.83, price_elp_3m:96.00  },
    { district:"Other",                  price_elite_5:21.38, price_elite_15:17.10, price_elite_30:14.96, price_elite_60:12.83, price_elp_3m:96.00  },
  ],
};

// priceKey maps each tier to the correct per-listing rate column
var TIERS = [
  { label:"0",      count:0,   elps:0, priceKey:"price_elite_60" },
  { label:"1-5",    count:5,   elps:1, priceKey:"price_elite_5"  },
  { label:"6-15",   count:15,  elps:2, priceKey:"price_elite_15" },
  { label:"16-30",  count:30,  elps:3, priceKey:"price_elite_30" },
  { label:"31-60",  count:60,  elps:5, priceKey:"price_elite_60" },
  { label:"61-100", count:100, elps:7, priceKey:"price_elite_60" },
];

var country   = "ES";
var districts = ALL_DATA[country];
var rows      = [];
var nextId    = 0;

// Last computed pricing snapshot — updated on every render()
var lastPricing = null;

function psych(v) {
  if (v <= 0) return 0;
  if (v < 1000)  return Math.round(v / 10)  * 10  - 1;
  if (v < 10000) return Math.round(v / 100) * 100 - 1;
  return Math.round(v / 500) * 500 - 1;
}

function fmt(v)    { return "\u20AC" + v.toLocaleString("en-US"); }
function fmtDec(v) { return "\u20AC" + v.toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ","); }

function getDistrictData(loc) {
  if (loc === "__whole__") {
    var maxD = districts[0];
    for (var i = 1; i < districts.length; i++) {
      if (districts[i].price_elite_60 > maxD.price_elite_60) maxD = districts[i];
    }
    return {
      data: {
        district:        "Whole Country",
        price_elite_5:   maxD.price_elite_5,
        price_elite_15:  maxD.price_elite_15,
        price_elite_30:  maxD.price_elite_30,
        price_elite_60:  maxD.price_elite_60,
        price_elp_3m:    maxD.price_elp_3m,
      },
      source: maxD.district,
    };
  }
  for (var i = 0; i < districts.length; i++) {
    if (districts[i].district === loc) return { data: districts[i], source: null };
  }
  return { data: districts[0], source: null };
}

function addRow(loc, tierIdx, addElps) {
  var id = nextId++;
  rows.push({ id: id, loc: loc || "__whole__", tierIdx: tierIdx || 0, addElps: addElps || 0 });
  renderRows();
  render();
}

function removeRow(id) {
  rows = rows.filter(function(r) { return r.id !== id; });
  renderRows();
  render();
}

function renderRows() {
  var container = document.getElementById("rows-container");
  container.innerHTML = "";

  for (var i = 0; i < rows.length; i++) {
    var r   = rows[i];
    var div = document.createElement("div");
    div.className = "input-row";
    div.setAttribute("data-id", r.id);

    var showRemove = rows.length > 1;
    var html = '<div><label>Country</label><select disabled><option>ES</option></select></div>';

    html += '<div><label>Province</label><select class="sel-loc" data-id="' + r.id + '">';
    html += '<option value="__whole__"' + (r.loc === "__whole__" ? " selected" : "") + '>Whole Country</option>';
    for (var j = 0; j < districts.length; j++) {
      html += '<option value="' + districts[j].district + '"' + (r.loc === districts[j].district ? " selected" : "") + '>' + districts[j].district + '</option>';
    }
    html += '</select></div>';

    html += '<div><label>Listings</label><select class="sel-tier" data-id="' + r.id + '">';
    for (var j = 0; j < TIERS.length; j++) {
      html += '<option value="' + j + '"' + (r.tierIdx === j ? " selected" : "") + '>' + TIERS[j].label + '</option>';
    }
    html += '</select></div>';

    html += '<div><label>Additional ELPs</label><select class="sel-elps" data-id="' + r.id + '">';
    for (var j = 0; j <= 10; j++) {
      html += '<option value="' + j + '"' + (r.addElps === j ? " selected" : "") + '>' + j + '</option>';
    }
    html += '</select></div>';

    html += showRemove
      ? '<button class="btn-remove" data-id="' + r.id + '">&times;</button>'
      : '<div style="width:32px"></div>';

    div.innerHTML = html;
    container.appendChild(div);
  }

  var locs = container.querySelectorAll(".sel-loc");
  for (var i = 0; i < locs.length; i++) {
    locs[i].addEventListener("change", function() {
      var id = parseInt(this.getAttribute("data-id"));
      for (var j = 0; j < rows.length; j++) { if (rows[j].id === id) rows[j].loc = this.value; }
      render();
    });
  }
  var tiers = container.querySelectorAll(".sel-tier");
  for (var i = 0; i < tiers.length; i++) {
    tiers[i].addEventListener("change", function() {
      var id = parseInt(this.getAttribute("data-id"));
      for (var j = 0; j < rows.length; j++) { if (rows[j].id === id) rows[j].tierIdx = parseInt(this.value); }
      render();
    });
  }
  var elps = container.querySelectorAll(".sel-elps");
  for (var i = 0; i < elps.length; i++) {
    elps[i].addEventListener("change", function() {
      var id = parseInt(this.getAttribute("data-id"));
      for (var j = 0; j < rows.length; j++) { if (rows[j].id === id) rows[j].addElps = parseInt(this.value); }
      render();
    });
  }
  var removes = container.querySelectorAll(".btn-remove");
  for (var i = 0; i < removes.length; i++) {
    removes[i].addEventListener("click", function() {
      removeRow(parseInt(this.getAttribute("data-id")));
    });
  }
}

function render() {
  var $output = document.getElementById("output");

  var rowCalcs = [];
  var totalListings = 0, totalElps = 0;
  var hasAny = false;

  for (var i = 0; i < rows.length; i++) {
    var r    = rows[i];
    var tier = TIERS[r.tierIdx];
    var info = getDistrictData(r.loc);
    var d    = info.data;

    if (tier.count === 0) { rowCalcs.push(null); continue; }
    hasAny = true;

    var cnt        = tier.count;
    var rElps      = tier.elps + r.addElps;
    var elpMo      = d.price_elp_3m;
    var priceElite = d[tier.priceKey]; // tier-appropriate rate

    // Elite listing component
    var e3r  = priceElite * cnt;
    var e6r  = priceElite * 2 * 0.9 * cnt;
    var e12r = priceElite * 4 * 0.8 * cnt;

    // ELP component (same period discounts as listings)
    var ep_e3r  = elpMo * 3 * rElps;
    var ep_e6r  = elpMo * 3 * rElps * 2 * 0.9;
    var ep_e12r = elpMo * 3 * rElps * 4 * 0.8;

    totalListings += cnt;
    totalElps     += rElps;

    rowCalcs.push({
      loc:        r.loc === "__whole__" ? "Whole Country" : r.loc,
      source:     info.source,
      tier:       tier,
      cnt:        cnt,
      elps:       rElps,
      e3r:  e3r,  e6r:  e6r,  e12r:  e12r,
      ep3r: e3r + ep_e3r, ep6r: e6r + ep_e6r, ep12r: e12r + ep_e12r,
      elpMo:      elpMo,
      priceElite: priceElite,
    });
  }

  if (!hasAny) {
    lastPricing = null;
    $output.innerHTML = '<div class="empty">Select a listing tier to see pricing.</div>';
    return;
  }

  // Totals = sum of per-row psych values
  var e3=0, e6=0, e12=0, ep3=0, ep6=0, ep12=0;
  for (var i = 0; i < rowCalcs.length; i++) {
    var rc = rowCalcs[i];
    if (!rc) continue;
    e3  += psych(rc.e3r);  e6  += psych(rc.e6r);  e12  += psych(rc.e12r);
    ep3 += psych(rc.ep3r); ep6 += psych(rc.ep6r); ep12 += psych(rc.ep12r);
  }

  // Price floors: minimum monthly rate × period length
  // 3m → €50/mo min, 6m → €45/mo min, 12m → €40/mo min
  e3  = Math.max(e3,   50 * 3);   e6  = Math.max(e6,  45 * 6);   e12  = Math.max(e12,  40 * 12);
  ep3 = Math.max(ep3,  50 * 3);   ep6 = Math.max(ep6, 45 * 6);   ep12 = Math.max(ep12, 40 * 12);

  // Savings calculated from display (psych) values
  var eSave6   = Math.max(e3  * 2 - e6,   0);
  var eSave12  = Math.max(e3  * 4 - e12,  0);
  var epSave6  = Math.max(ep3 * 2 - ep6,  0);
  var epSave12 = Math.max(ep3 * 4 - ep12, 0);

  var periods = [
    { label:"3 Months",  mo:3,  eT:e3,  epT:ep3,  eSave:0,       epSave:0        },
    { label:"6 Months",  mo:6,  eT:e6,  epT:ep6,  eSave:eSave6,  epSave:epSave6  },
    { label:"12 Months", mo:12, eT:e12, epT:ep12, eSave:eSave12, epSave:epSave12 },
  ];

  // Build listing label from tier range strings
  var tierLabels = [];
  for (var i = 0; i < rowCalcs.length; i++) {
    if (rowCalcs[i]) tierLabels.push(rowCalcs[i].tier.label);
  }
  var listingLabel = tierLabels.join(" + ") + " Listings";

  // Province summary for HubSpot note
  var provinceSummary = [];
  for (var i = 0; i < rowCalcs.length; i++) {
    var rci = rowCalcs[i];
    if (!rci) continue;
    var pname = rci.loc + (rci.source ? " (" + rci.source + ")" : "");
    provinceSummary.push(pname + ": " + rci.tier.label + " listings, " + rci.elps + " ELPs");
  }

  // Store snapshot for HubSpot push
  lastPricing = {
    elite_3m:  e3,  elite_6m:  e6,  elite_12m:  e12,
    ep_3m:     ep3, ep_6m:     ep6, ep_12m:     ep12,
    totalListings:   totalListings,
    totalElps:       totalElps,
    listingLabel:    listingLabel,
    provinceSummary: provinceSummary.join("\n"),
    provinceLabel:   provinceSummary.length === 1
      ? rowCalcs.filter(function(r){ return r; })[0].loc
      : rowCalcs.filter(function(r){ return r; }).map(function(r){ return r.loc; }).join(", "),
    rowCalcs: rowCalcs,
  };

  var hsIcon = '<svg width="12" height="12" viewBox="0 0 56 56" fill="none"><circle cx="28" cy="28" r="28" fill="#FF7A59"/><path d="M22 16v10.5M22 26.5a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11ZM34 22.5a3 3 0 1 0 0-6 3 3 0 0 0 0 6Zm0-3v7.5m0 0a5.5 5.5 0 1 0 0 11 5.5 5.5 0 0 0 0-11Z" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/></svg>';

  var html = '<div class="cards">';

  // Card headers
  html += '<div class="card-head elite"><h2>Elite</h2><div class="sub">' + listingLabel + '</div><div class="sub" style="visibility:hidden">_</div></div>';
  html += '<div class="card-head ep"><div class="badge-rec">Recommended</div><h2>Elite Plus</h2><div class="sub">' + listingLabel + '</div><div class="elp-info">' + totalElps + ' Promoted Listing' + (totalElps !== 1 ? 's' : '') + '</div></div>';

  var planKeys = ["elite_3m", "elite_6m", "elite_12m"];
  var epKeys   = ["ep_3m",    "ep_6m",    "ep_12m"];

  for (var i = 0; i < periods.length; i++) {
    var p    = periods[i];
    var last = (i === 2) ? " last" : "";

    html += '<div class="row elite' + last + '">';
    html += '<div class="period">' + p.label + '</div>';
    if (p.eSave > 0) html += '<div><span class="save-badge green">Save ' + fmt(p.eSave) + '</span></div>';
    html += '<div class="price">' + fmt(p.eT) + ' <span class="suffix">Total</span></div>';
    html += '<div class="monthly">' + fmtDec(p.eT / p.mo) + ' / Month</div>';
    html += '<button class="row-push-btn" data-plan="' + planKeys[i] + '">' + hsIcon + 'Update Deal</button>';
    html += '</div>';

    html += '<div class="row ep' + last + '">';
    html += '<div class="period">' + p.label + '</div>';
    if (p.epSave > 0) html += '<div><span class="save-badge gold">Save ' + fmt(p.epSave) + '</span></div>';
    html += '<div class="price">' + fmt(p.epT) + ' <span class="suffix">Total</span></div>';
    html += '<div class="monthly">' + fmtDec(p.epT / p.mo) + ' / Month</div>';
    html += '<button class="row-push-btn" data-plan="' + epKeys[i] + '">' + hsIcon + 'Update Deal</button>';
    html += '</div>';
  }

  html += '</div>';

  // Per-province breakdown table
  html += '<div class="breakdown-box"><div class="title">Cost Breakdown by Province</div><div class="tbl-wrap">';
  html += '<table class="calc-table"><thead><tr>';
  html += '<th>Province</th><th>Listings</th><th>ELPs</th>';
  html += '<th>Elite (3m)</th><th>Elite (6m)</th><th>Elite (12m)</th>';
  html += '<th>Elite+ (3m)</th><th>Elite+ (6m)</th><th>Elite+ (12m)</th>';
  html += '</tr></thead><tbody>';

  var activeRows = rowCalcs.filter(function(r){ return r; });
  for (var i = 0; i < rowCalcs.length; i++) {
    var rc = rowCalcs[i];
    if (!rc) continue;
    var label = rc.loc;
    if (rc.source) label += ' <span style="font-size:11px;color:#1B7B6E">(' + rc.source + ')</span>';
    // For a single-row result, use the floored totals so the table matches the cards.
    // For multi-row, individual rows show pre-floor psych values; the total row shows floored sums.
    var td_e3, td_e6, td_e12, td_ep3, td_ep6, td_ep12;
    if (activeRows.length === 1) {
      td_e3 = e3; td_e6 = e6; td_e12 = e12;
      td_ep3 = ep3; td_ep6 = ep6; td_ep12 = ep12;
    } else {
      td_e3 = psych(rc.e3r); td_e6 = psych(rc.e6r); td_e12 = psych(rc.e12r);
      td_ep3 = psych(rc.ep3r); td_ep6 = psych(rc.ep6r); td_ep12 = psych(rc.ep12r);
    }
    html += '<tr>';
    html += '<td>' + label + '</td>';
    html += '<td>' + rc.tier.label + '</td>';
    html += '<td>' + rc.elps + '</td>';
    html += '<td>' + fmt(td_e3)  + '</td>';
    html += '<td>' + fmt(td_e6)  + '</td>';
    html += '<td>' + fmt(td_e12) + '</td>';
    html += '<td>' + fmt(td_ep3) + '</td>';
    html += '<td>' + fmt(td_ep6) + '</td>';
    html += '<td>' + fmt(td_ep12)+ '</td>';
    html += '</tr>';
  }

  if (activeRows.length > 1) {
    html += '<tr class="total-row">';
    html += '<td>Total</td><td>' + totalListings + '</td><td>' + totalElps + '</td>';
    html += '<td>' + fmt(e3)  + '</td><td>' + fmt(e6)  + '</td><td>' + fmt(e12)  + '</td>';
    html += '<td>' + fmt(ep3) + '</td><td>' + fmt(ep6) + '</td><td>' + fmt(ep12) + '</td>';
    html += '</tr>';
  }

  html += '</tbody></table></div></div>';

  // HubSpot status panel
  html += '<div class="hs-panel"><div id="hs-status" class="hs-status"></div></div>';

  $output.innerHTML = html;

  // Wire up push buttons
  var pushBtns = $output.querySelectorAll(".row-push-btn");
  for (var i = 0; i < pushBtns.length; i++) {
    pushBtns[i].addEventListener("click", function() {
      pushToHubSpot(this.getAttribute("data-plan"), this);
    });
  }
}

function pushToHubSpot(planKey, btn) {
  var dealId  = (document.getElementById("hs-deal-id").value || "").trim();
  var $status = document.getElementById("hs-status");

  if (!dealId) {
    $status.className   = "hs-status error";
    $status.textContent = "Please enter a HubSpot Deal ID first.";
    document.getElementById("hs-deal-id").focus();
    return;
  }
  if (!lastPricing) {
    $status.className   = "hs-status error";
    $status.textContent = "No pricing data available.";
    return;
  }

  var planLabels = {
    elite_3m:  "Elite \u2014 3 Months",
    elite_6m:  "Elite \u2014 6 Months",
    elite_12m: "Elite \u2014 12 Months",
    ep_3m:     "Elite Plus \u2014 3 Months",
    ep_6m:     "Elite Plus \u2014 6 Months",
    ep_12m:    "Elite Plus \u2014 12 Months",
  };

  var subTypes = {
    elite_3m: "Elite", elite_6m: "Elite", elite_12m: "Elite",
    ep_3m: "Elite Plus", ep_6m: "Elite Plus", ep_12m: "Elite Plus",
  };

  var termMonths = {
    elite_3m: 3,  elite_6m: 6,  elite_12m: 12,
    ep_3m:    3,  ep_6m:    6,  ep_12m:    12,
  };

  var payload = {
    deal_id:           dealId,
    plan_label:        planLabels[planKey],
    amount:            lastPricing[planKey],
    elite_3m:          lastPricing.elite_3m,
    elite_6m:          lastPricing.elite_6m,
    elite_12m:         lastPricing.elite_12m,
    ep_3m:             lastPricing.ep_3m,
    ep_6m:             lastPricing.ep_6m,
    ep_12m:            lastPricing.ep_12m,
    listing_label:     lastPricing.listingLabel,
    total_listings:    lastPricing.totalListings,
    total_elps:        lastPricing.totalElps,
    province_summary:  lastPricing.provinceSummary,
    price_country:         country,
    price_sub_type:        subTypes[planKey],
    price_term_months:     termMonths[planKey],
    price_listings:        lastPricing.listingLabel,
    price_additional_elps: lastPricing.totalElps,
    price_province:        lastPricing.provinceLabel,
  };

  var allBtns = document.querySelectorAll(".row-push-btn");
  for (var i = 0; i < allBtns.length; i++) allBtns[i].disabled = true;

  var origHTML = btn.innerHTML;
  btn.innerHTML = "Sending\u2026";
  $status.className   = "hs-status loading";
  $status.textContent = "Updating deal " + dealId + "\u2026";

  fetch(N8N_WEBHOOK_URL, {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify(payload),
  })
  .then(function(res) {
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json().catch(function() { return {}; });
  })
  .then(function() {
    $status.className   = "hs-status success";
    $status.textContent = "\u2713 Deal " + dealId + " updated \u2014 " + planLabels[planKey] + " (" + fmt(lastPricing[planKey]) + ") set as Amount, pricing note added.";
    btn.innerHTML = "\u2713 Sent";
    btn.classList.add("sent");
    setTimeout(function() {
      btn.innerHTML = origHTML;
      btn.classList.remove("sent");
    }, 3000);
    for (var i = 0; i < allBtns.length; i++) allBtns[i].disabled = false;
  })
  .catch(function(err) {
    $status.className   = "hs-status error";
    $status.textContent = "Error: " + err.message + ". Check the webhook URL and n8n workflow.";
    btn.innerHTML = origHTML;
    for (var i = 0; i < allBtns.length; i++) allBtns[i].disabled = false;
  });
}

document.getElementById("btn-add").addEventListener("click", function() { addRow(); });

// Init with one row
addRow("__whole__", 0, 0);
</script>
